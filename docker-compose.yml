services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 3s
      retries: 30

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: rag-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123456
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./.data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 30

  opensearch:
    image: opensearchproject/opensearch:2.19.0
    container_name: rag-opensearch
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "uG7#pQ2!sN9@kT5$"
      OPENSEARCH_JAVA_OPTS: "-Xms1g -Xmx1g"
      bootstrap.memory_lock: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - ./.data/opensearch:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 60

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.19.0
    container_name: rag-opensearch-dashboards
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy

  rag-service:
    build:
      context: ./rag-service
    container_name: rag-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      RAG_OPENSEARCH_URL: http://opensearch:9200
      RAG_POSTGRES_JDBC_URL: jdbc:postgresql://postgres:5432/rag
      RAG_POSTGRES_USER: rag
      RAG_POSTGRES_PASSWORD: rag
      RAG_OLLAMA_URL: http://host.docker.internal:11434
      RAG_OLLAMA_DEFAULT_MODEL: qwen2.5:7b
      RAG_OLLAMA_DEEP_MODEL: huihui_ai/deepseek-r1-abliterated:latest
      RAG_OLLAMA_EMBEDDING_MODEL: bge-m3
      RAG_OLLAMA_EMBEDDING_DIM: 1024
      RAG_OLLAMA_TIMEOUT_SECONDS: 600
    ports:
      - "8080:8080"
    volumes:
      - ./inbox:/inbox
    depends_on:
      opensearch:
        condition: service_healthy
      postgres:
        condition: service_healthy

